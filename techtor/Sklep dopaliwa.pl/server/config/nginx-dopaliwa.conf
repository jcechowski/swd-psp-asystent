# =============================================================================
# dopaliwa.pl — nginx vhost dla Magento 2.4.7
# =============================================================================
# Instalacja:
#   cp nginx-dopaliwa.conf /etc/nginx/sites-available/dopaliwa.pl
#   ln -s /etc/nginx/sites-available/dopaliwa.pl /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# =============================================================================

upstream fastcgi_backend {
    server unix:/run/php/php-fpm-dopaliwa.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name dopaliwa.pl www.dopaliwa.pl;

    # Certbot podmieni na redirect do HTTPS
    root /var/www/dopaliwa/pub;
    index index.php;

    # --- Magento 2 nginx config (oparty o oficjalny nginx.conf.sample) ---

    set $MAGE_ROOT /var/www/dopaliwa;
    set $MAGE_MODE production;

    # Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ /(app|bin|dev|generated|lib|phpserver|setup|update|vendor)/ {
        deny all;
    }

    location ~ ^/pub/media/(downloadable|customer|import|custom_options|theme_customization/.*\.xml) {
        deny all;
    }

    # Static files
    location /static/ {
        expires max;
        add_header Cache-Control "public, immutable";

        # Magento generated static versioning
        location ~ ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }

        location ~* \.(ico|jpg|jpeg|png|gif|svg|svgz|webp|avif|js|css|eot|ttf|otf|woff|woff2|html|json|webmanifest)$ {
            expires max;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Fallback do Magento
        location ~ \.php$ {
            return 404;
        }

        try_files $uri $uri/ =404;
    }

    # Media files
    location /media/ {
        # Product images, CMS media
        try_files $uri $uri/ /get.php$is_args$args;

        location ~ ^/media/theme_customization/.*\.xml {
            deny all;
        }

        location ~* \.(ico|jpg|jpeg|png|gif|svg|svgz|webp|avif|js|css|eot|ttf|otf|woff|woff2)$ {
            expires max;
            add_header Cache-Control "public";
            access_log off;
        }

        location ~ \.php$ {
            return 404;
        }
    }

    # PHP entry point (pub/index.php)
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/(index|get|static|errors/report|errors/404|errors/503|health_check)\.php$ {
        try_files $uri =404;

        fastcgi_pass fastcgi_backend;
        fastcgi_buffers 1024 4k;
        fastcgi_buffer_size 128k;
        fastcgi_busy_buffers_size 256k;

        fastcgi_param PHP_FLAG "session.auto_start=off \n suhosin.session.cryptua=off";
        fastcgi_param PHP_VALUE "memory_limit=756M \n max_execution_time=18000";

        fastcgi_read_timeout 600s;
        fastcgi_connect_timeout 600s;

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param MAGE_MODE $MAGE_MODE;
        include fastcgi_params;
    }

    # Block other PHP files
    location ~ \.php$ {
        return 404;
    }

    # Client body size (uploads)
    client_max_body_size 64M;

    # Logging
    access_log /var/log/nginx/dopaliwa-access.log;
    error_log  /var/log/nginx/dopaliwa-error.log warn;
}
